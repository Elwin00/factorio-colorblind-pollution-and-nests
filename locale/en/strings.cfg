[mod-setting-name]
colorblind-pollution-enabled=Recolor pollution on the map
colorblind-nests-enabled=Recolor enemies on the map

[mod-setting-description]
colorblind-pollution-enabled=Shows pollution on the map and minimap in a custom colorblind-friendly color instead of the game default. When unchecked, the default color is used.
colorblind-nests-enabled=Shows enemy nests, enemies and other enemy structures on the map and minimap in a custom colorblind-friendly color instead of the default red. When unchecked, the default color is used.
