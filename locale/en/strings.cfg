[mod-setting-name]
colorblind-pollution-enabled=Recolor pollution on the map
colorblind-pollution-color=Pollution color
colorblind-nests-enabled=Recolor enemies on the map
colorblind-nests-color=Enemy color
colorblind-bulk-inserter-enabled=Recolor the bulk inserter

[mod-setting-description]
colorblind-pollution-enabled=Shows pollution on the map and minimap in the chosen color instead of the game default. When unchecked, the default color is used.
colorblind-pollution-color=The color used for pollution on the map when "Recolor pollution on the map" is enabled. Has no effect while that setting is disabled.
colorblind-nests-enabled=Shows enemy nests, enemies and other enemy structures on the map and minimap in the chosen color instead of the default red. When unchecked, the default color is used.
colorblind-nests-color=The color used for enemies on the map when "Recolor enemies on the map" is enabled. Has no effect while that setting is disabled.
colorblind-bulk-inserter-enabled=Tints the bulk inserter (in-world and its icons and techs) toward a darker, more distinct green, to make it easier to tell apart from the regular yellow inserter. Off by default.
