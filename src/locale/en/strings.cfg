[mod-setting-name]
colorblind-pollution-enabled=Overwrite color for pollution cloud
colorblind-nests-enabled=Overwrite color for enemy nests

[mod-setting-description]
colorblind-pollution-enabled=When enabled, pollution on the map is shown in the mod's custom color instead of the game default.
colorblind-nests-enabled=When enabled, enemy nests on the map are shown in the mod's custom color instead of the game default.
